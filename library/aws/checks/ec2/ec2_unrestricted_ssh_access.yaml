CheckTitle: Ensure no security groups allow unrestricted inbound access on SSH port 22
CheckType: []
ServiceName: ec2
SubServiceName: securitygroup
ResourceIdTemplate: arn:partition:ec2:region:account-id:security-group/sg-id
